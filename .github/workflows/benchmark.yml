name: Build Tool Benchmarks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  benchmark-vite:
    name: Vite v${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['5', '6', '8']
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Use version-specific lockfile
        run: cp ci/lockfiles/vite-v${{ matrix.version }}.yaml pnpm-lock.yaml
      - name: Override Vite version in package.json
        run: |
          cd vite
          jq '.devDependencies.vite = "^${{ matrix.version }}"' package.json > tmp.json && mv tmp.json package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install hyperfine
        run: sudo apt-get install -y hyperfine
      - name: Benchmark cold build
        run: |
          rm -rf vite/dist
          hyperfine --warmup 0 --runs 5 --export-json /tmp/bench.json \
            "pnpm --filter vite-basic-build build"
      - name: Collect results
        run: |
          MEAN=$(jq '.results[0].mean' /tmp/bench.json)
          STDDEV=$(jq '.results[0].stddev' /tmp/bench.json)
          pnpm --filter vite-basic-build build 2>&1
          JS_SIZE=$(find vite/dist -name "*.js" -exec stat -c%s {} + 2>/dev/null | awk '{s+=$1}END{print s+0}')
          CSS_SIZE=$(find vite/dist -name "*.css" -exec stat -c%s {} + 2>/dev/null | awk '{s+=$1}END{print s+0}')
          JS_GZIP=$(find vite/dist -name "*.js" -exec gzip -c {} \; 2>/dev/null | wc -c)
          CSS_GZIP=$(find vite/dist -name "*.css" -exec gzip -c {} \; 2>/dev/null | wc -c)
          mkdir -p /tmp/results
          cat > /tmp/results/result.json <<EOF
          {
            "tool": "Vite",
            "version": "${{ matrix.version }}",
            "build_time_s": $MEAN,
            "build_time_stddev": $STDDEV,
            "js_bytes": $JS_SIZE,
            "css_bytes": $CSS_SIZE,
            "js_gzip": $JS_GZIP,
            "css_gzip": $CSS_GZIP
          }
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: bench-vite-v${{ matrix.version }}
          path: /tmp/results/result.json

