name: Build Tool Benchmarks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  benchmark-vite:
    name: Vite v${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['5', '6', '8']
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Use version-specific lockfile
        run: cp ci/lockfiles/vite-v${{ matrix.version }}.yaml pnpm-lock.yaml
      - name: Override Vite version in package.json
        run: |
          cd vite
          jq '.devDependencies.vite = "^${{ matrix.version }}"' package.json > tmp.json && mv tmp.json package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm --filter vite-basic-build build
      - name: Install hyperfine
        run: sudo apt-get install -y hyperfine
      - name: Benchmark cold build
        run: |
          rm -rf vite/dist
          hyperfine --warmup 0 --runs 5 --export-markdown /tmp/bench.md \
            "pnpm --filter vite-basic-build build"
          echo "### Vite v${{ matrix.version }} Benchmark" >> $GITHUB_STEP_SUMMARY
          cat /tmp/bench.md >> $GITHUB_STEP_SUMMARY
      - name: Report bundle size
        run: |
          echo "### Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find vite/dist -name "*.js" -o -name "*.css" | xargs ls -lh 2>/dev/null || echo "No output files"
          echo '```' >> $GITHUB_STEP_SUMMARY

