  report:
    name: Benchmark Report
    needs: [benchmark-vite, benchmark-parcel, benchmark-webpack, benchmark-esbuild, benchmark-turbo]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/bench-results
          pattern: bench-*
      - name: Generate report
        run: |
          echo "## Build Tool Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Version | Build Time | Std Dev | JS (raw) | JS (gzip) | CSS (raw) | CSS (gzip) |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|-----------|---------|----------|-----------|-----------|------------|" >> $GITHUB_STEP_SUMMARY

          for dir in /tmp/bench-results/bench-*/; do
            if [ -f "$dir/result.json" ]; then
              TOOL=$(jq -r '.tool' "$dir/result.json")
              VERSION=$(jq -r '.version' "$dir/result.json")
              TIME=$(jq '.build_time_s' "$dir/result.json" | awk '{printf "%.2fs", $1}')
              STDDEV=$(jq '.build_time_stddev' "$dir/result.json" | awk '{printf "%.3fs", $1}')
              JS=$(jq '.js_bytes' "$dir/result.json" | awk '{printf "%.1fKB", $1/1024}')
              JS_GZ=$(jq '.js_gzip' "$dir/result.json" | awk '{printf "%.1fKB", $1/1024}')
              CSS=$(jq '.css_bytes' "$dir/result.json" | awk '{printf "%.1fKB", $1/1024}')
              CSS_GZ=$(jq '.css_gzip' "$dir/result.json" | awk '{printf "%.1fKB", $1/1024}')
              echo "| $TOOL | v$VERSION | $TIME | ±$STDDEV | $JS | $JS_GZ | $CSS | $CSS_GZ |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Measured with [hyperfine](https://github.com/sharkdp/hyperfine) (5 runs, mean). Ubuntu runner, Node 22.*" >> $GITHUB_STEP_SUMMARY

      - name: Save report as artifact
        run: cp $GITHUB_STEP_SUMMARY /tmp/benchmark-report.md 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: /tmp/benchmark-report.md
          if-no-files-found: ignore
